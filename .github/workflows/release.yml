name: release-please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - name: Create release PR or GitHub Release
        id: release
        uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 20.19.0
          cache: npm

      - name: Use npm 11
        if: ${{ steps.release.outputs.release_created }}
        run: npm install --global npm@11

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Type-check workspaces
        if: ${{ steps.release.outputs.release_created }}
        run: npm run typecheck

      - name: Run tests
        if: ${{ steps.release.outputs.release_created }}
        run: npm test

      - name: Build extension
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Package extension zip
        if: ${{ steps.release.outputs.release_created }}
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_name="aws-console-switcher-${RELEASE_TAG}.zip"
          package_path="artifacts/${package_name}"
          export PACKAGE_PATH="${package_path}"

          mkdir -p artifacts
          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          source = Path("packages/extension/dist")
          target = Path(os.environ["PACKAGE_PATH"])

          if not source.is_dir():
              raise SystemExit(f"Extension build output is missing: {source}")

          with zipfile.ZipFile(target, "w", zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(source.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(source).as_posix())
          PY

          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "package_path=${package_path}" >> "${GITHUB_OUTPUT}"
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}

      - name: Upload packaged extension
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: ${{ steps.package.outputs.package_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload packaged extension to GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        run: gh release upload "${RELEASE_TAG}" "${PACKAGE_PATH}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          PACKAGE_PATH: ${{ steps.package.outputs.package_path }}
